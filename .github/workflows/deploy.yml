name: Deploy to Jelastic

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH to Jelastic
        uses: appleboy/ssh-action@v1.0.3
        with:
          command_timeout: 30m 
          host: ${{ secrets.JELASTIC_HOST }}
          username: ${{ secrets.JELASTIC_USER }}
          key: ${{ secrets.JELASTIC_SSH_KEY }}
          port: ${{ secrets.JELASTIC_PORT }}
          script: |
            set -euo pipefail
            cd /opt/bl-app
            # git pull can fail silently when server-only untracked files block the merge
            # (e.g. scripts/run-engagement-cron.sh). Force-sync to GitHub main instead.
            git fetch origin main
            git reset --hard origin/main
            echo "Deploying commit: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"
            docker build -t biography-library .
            docker stop bl-app || true
            docker rm bl-app || true
            docker run -d \
              --name bl-app \
              --restart unless-stopped \
              -p 80:80 \
              --env-file .env \
              biography-library
            docker image prune -f
            echo "Deploy completato: $(date)"
